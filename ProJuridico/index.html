<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión | Sistema Jurídico</title>
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
  <main class="login-page">
    <section class="login-card">
      <div class="login-brand">
        <div class="logo">SJ</div>
        <h1>Sistema Jurídico</h1>
        <p>Acceso al sistema</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="field">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>
        </div>

        <div class="field">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="btn primary">Ingresar</button>
      </form>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
